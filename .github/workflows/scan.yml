name: scan

# Runs the scanner pipeline in the cloud (no laptop needed) and publishes the
# dashboard to GitHub Pages.
#
# Triggering is done EXTERNALLY by cron-job.org (which calls the GitHub API to
# fire workflow_dispatch) because GitHub's own `schedule:` cron proved
# unreliable AND, once it did wake up, double-triggered alongside cron-job.org.
# cron-job.org schedule (America/New_York): premarket `30 8 * * 1-5` and
# intraday `0,30 10-14 * * 1-5`.
on:
  workflow_dispatch:               # fired by cron-job.org (and the manual button)

permissions:
  contents: write                  # allow the job to commit the dashboard

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Every trigger passes --telegram; build_dashboard's send_alert() decides
      # whether to actually send (premarket always; intraday only on new setups).
      TG: ${{ github.event_name == 'workflow_dispatch' && '--telegram' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - name: Run scanners
        run: |
          python pipeline/scanner_a.py
          python pipeline/scanner_d.py
          python pipeline/scanner_b.py
          python pipeline/scanner_c.py
      - name: Build & publish dashboard
        run: python pipeline/build_dashboard.py --public --out index.html $TG
      - name: Commit dashboard
        run: |
          git config user.name  "tv-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          [ -f tg_state.json ] && git add tg_state.json
          git diff --staged --quiet || git commit -m "dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
